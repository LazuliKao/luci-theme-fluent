name: CI

on:
  push:
    branches: [main, openwrt-24.10]
  pull_request:
    branches: [main, openwrt-24.10]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare CI source
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: Resolve CI version
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
        run: |
          BASE_VERSION=$(sed -n 's/^PKG_VERSION:=//p' Makefile)
          SHORT_SHA=$(printf '%.7s' "$SHA")
          if [ "$EVENT_NAME" = "pull_request" ]; then
            VERSION="${BASE_VERSION}-pr${PR_NUMBER}-${SHORT_SHA}"
          else
            VERSION="${BASE_VERSION}-dev-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using CI version ${VERSION}"

      - name: Sync version files
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/" Makefile
          sed -i "s/^  \"version\": \"[^\"]*\",/  \"version\": \"${VERSION}\",/" package.json
          grep '^PKG_VERSION:=' Makefile
          grep '^  "version":' package.json

      - name: Pack prepared source
        run: tar --exclude=.git -czf ci-source.tar.gz .

      - name: Upload prepared source
        uses: actions/upload-artifact@v4
        with:
          name: ci-source-${{ github.run_id }}
          path: ci-source.tar.gz

  scss:
    name: SCSS Build Validation
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Download prepared source
        uses: actions/download-artifact@v4
        with:
          name: ci-source-${{ github.run_id }}

      - name: Extract prepared source
        run: tar -xzf ci-source.tar.gz

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CSS & JS
        run: pnpm run build

      - name: Verify output
        run: |
          test -s htdocs/luci-static/fluent/css/fluent.css
          size=$(wc -c < htdocs/luci-static/fluent/css/fluent.css)
          echo "fluent.css built successfully (${size} bytes)"

      - name: Upload CSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluent-css
          path: htdocs/luci-static/fluent/css/fluent.css

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint with Biome
        run: pnpm run lint || true

  openwrt-sdk:
    name: OpenWrt SDK Build (${{ matrix.version }})
    needs: scss
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['24.10.7', '25.12.4']
    steps:
      - name: Download prepared source
        uses: actions/download-artifact@v4
        with:
          name: ci-source-${{ github.run_id }}

      - name: Extract prepared source
        run: tar -xzf ci-source.tar.gz

      - name: Download CSS artifact
        uses: actions/download-artifact@v4
        with:
          name: fluent-css
          path: htdocs/luci-static/fluent/css/

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd wget

      - name: Prepare package sources
        run: |
          mkdir -p ${HOME}/builder/packages
          cp -r "$PWD" "${HOME}/builder/packages/luci-theme-fluent"
          echo "Staged packages:"
          ls -la ${HOME}/builder/packages/

      - name: Build packages
        run: |
          chmod +x .github/workflows/build.sh
          bash .github/workflows/build.sh "${{ matrix.version }}"

      - name: Collect built packages
        run: |
          mkdir -p output
          cp ${HOME}/builder/output/luci-theme-fluent*.ipk output/ 2>/dev/null || true
          cp ${HOME}/builder/output/luci-theme-fluent*.apk output/ 2>/dev/null || true
          cp ${HOME}/builder/output/luci-i18n-fluent*.ipk output/ 2>/dev/null || true
          cp ${HOME}/builder/output/luci-i18n-fluent*.apk output/ 2>/dev/null || true
          echo "Built packages:"
          ls -lh output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-openwrt-${{ matrix.version }}
          path: |
            output/luci-theme-fluent*.ipk
            output/luci-theme-fluent*.apk
            output/luci-i18n-fluent*.ipk
            output/luci-i18n-fluent*.apk
          if-no-files-found: warn

  nightly:
    name: Nightly Release
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/openwrt-24.10')
    needs: [prepare, openwrt-sdk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: packages/
          pattern: packages-openwrt-*
          merge-multiple: true
      - name: List packages
        run: |
          echo "Nightly packages:"
          find packages/ -type f \( -name "*.ipk" -o -name "*.apk" \) -exec ls -lh {} \;
      - name: Delete old nightly release
        run: |
          if gh release view nightly >/dev/null 2>&1; then
            gh release delete nightly --yes --cleanup-tag
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build"
          overwrite_files: true
          body: |
            ## LuCI Theme Fluent - Nightly Build

            Automatic build for package version `${{ needs.prepare.outputs.version }}` from commit `${{ github.sha }}`.

            ### Packages
            - `luci-theme-fluent` — FluentUI theme for OpenWrt LuCI
            - `luci-i18n-fluent` — Translations

            ### Installation

            **OpenWrt 24.10.x (opkg/ipk):**
            ```bash
            opkg install luci-theme-fluent_*.ipk
            ```

            **OpenWrt 25.12.x (apk):**
            ```bash
            apk add luci-theme-fluent_*.apk
            ```
          files: |
            packages/**/*.ipk
            packages/**/*.apk
          prerelease: true
