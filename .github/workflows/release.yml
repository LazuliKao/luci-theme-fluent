name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release source
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TAG }}

      - id: meta
        name: Resolve release version
        run: |
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using release version ${VERSION} from ${TAG}"

      - name: Sync version files
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/" Makefile
          sed -i "s/^  \"version\": \"[^\"]*\",/  \"version\": \"${VERSION}\",/" package.json
          grep '^PKG_VERSION:=' Makefile
          grep '^  "version":' package.json

      - name: Commit version bump
        if: github.event_name == 'push'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          TAG_COMMIT=$(git rev-list -n 1 "$TAG")
          BRANCH=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin --contains "$TAG_COMMIT" | grep -Ev '^origin/HEAD$' | sed 's#^origin/##' | head -1)
          BRANCH=${BRANCH:-$DEFAULT_BRANCH}
          git checkout "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Makefile package.json
          if git diff --cached --quiet; then
            echo "Version files already match ${TAG}; nothing to commit."
          else
            git commit -m "chore: sync release version ${TAG}"
            git push origin HEAD:"$BRANCH"
          fi

      - name: Pack prepared source
        run: tar --exclude=.git -czf release-source.tar.gz .

      - name: Upload prepared source
        uses: actions/upload-artifact@v4
        with:
          name: release-source-${{ env.TAG }}
          path: release-source.tar.gz

  scss:
    name: Build CSS
    needs: prepare
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download prepared source
        uses: actions/download-artifact@v4
        with:
          name: release-source-${{ env.TAG }}

      - name: Extract prepared source
        run: tar -xzf release-source.tar.gz

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build CSS & JS
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          test -s htdocs/luci-static/fluent/css/fluent.css

      - name: Upload CSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluent-css
          path: htdocs/luci-static/fluent/css/fluent.css

  release:
    name: Build & Publish (${{ matrix.version }})
    needs: [prepare, scss]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['24.10.7', '25.12.4']
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download prepared source
        uses: actions/download-artifact@v4
        with:
          name: release-source-${{ env.TAG }}

      - name: Extract prepared source
        run: tar -xzf release-source.tar.gz

      - name: Download CSS artifact
        uses: actions/download-artifact@v4
        with:
          name: fluent-css
          path: htdocs/luci-static/fluent/css/

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd wget

      - name: Prepare package sources
        run: |
          mkdir -p ${HOME}/builder/packages
          cp -r "$PWD" "${HOME}/builder/packages/luci-theme-fluent"

      - name: Build packages
        run: |
          chmod +x .github/workflows/build.sh
          bash .github/workflows/build.sh "${{ matrix.version }}"

      - name: Collect built packages
        run: |
          mkdir -p release
          cp ${HOME}/builder/output/luci-theme-fluent*.ipk release/ 2>/dev/null || true
          cp ${HOME}/builder/output/luci-theme-fluent*.apk release/ 2>/dev/null || true
          echo "Built packages:"
          ls -lh release/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.TAG }}-openwrt-${{ matrix.version }}
          path: |
            release/luci-theme-fluent*.ipk
            release/luci-theme-fluent*.apk

  publish:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: release-${{ env.TAG }}-*
          merge-multiple: true

      - name: List all packages
        run: |
          echo "All packages for release ${{ env.TAG }}:"
          find artifacts/ -type f \( -name "*.ipk" -o -name "*.apk" \) -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Release ${{ env.TAG }}"
          body: |
            ## LuCI Theme Fluent ${{ env.TAG }}

            ### Packages
            - `luci-theme-fluent` — FluentUI theme for OpenWrt LuCI

            ### Installation

            **OpenWrt 24.10.x (opkg/ipk):**
            ```bash
            opkg install luci-theme-fluent_*.ipk
            ```

            **OpenWrt 25.12.x (apk):**
            ```bash
            apk add luci-theme-fluent_*.apk
            ```
          files: |
            artifacts/**/*.ipk
            artifacts/**/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
